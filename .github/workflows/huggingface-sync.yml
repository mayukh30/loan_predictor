name: Sync to Hugging Face Space

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to Hugging Face
        run: git push --force https://mayukh30:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/mayukh30/loan-prediction main
